<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pig Game Deluxe - Projecte Escolar</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        
        #instruccions {
            background-color: #16213e; border-left: 5px solid #f1c40f;
            padding: 15px; border-radius: 8px; max-width: 600px; margin-bottom: 20px;
            font-size: 0.85rem; line-height: 1.4;
        }

        /* El Dado Animado */
        #dice-container {
            width: 100px; height: 100px; background-color: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 15px; box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        #dice-text { color: #1a1a2e; font-family: monospace; font-size: 12px; white-space: pre; font-weight: bold; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -1px) rotate(-3deg); }
            50% { transform: translate(2px, 1px) rotate(3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shaking { animation: shake 0.1s infinite; background-color: #f1c40f !important; }

        #terminal { 
            background-color: #0f3460; color: #4ecca3; padding: 15px; border-radius: 10px;
            width: 90%; max-width: 500px; height: 120px; overflow-y: auto; font-family: monospace;
        }

        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #btn-tira { background-color: #2ecc71; color: white; }
        #btn-acumula { background-color: #f1c40f; color: #1a1a2e; }
        #btn-restart { background-color: #e94560; color: white; display: none; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>🎲 PIG GAME 🐷</h1>
    
    <div id="instruccions">
        <strong>Regles:</strong> Arriba a 100 per guanyar. Si treus un 1, perds els punts del torn. 
        Pots "Acumular" per guardar els punts de la ronda.
    </div>

    <div id="dice-container"><div id="dice-text">PIG</div></div>

    <div id="scoreboard" style="font-size: 1.3rem; margin: 10px; font-weight: bold;">Tu: 0 | CPU: 0</div>
    <div id="terminal">Prem el botó per començar!</div>

    <div class="controls">
        <button id="btn-tira">🎲 TIRAR</button>
        <button id="btn-acumula">💰 ACUMULAR</button>
        <button id="btn-restart">🔄 TORNA A JUGAR</button>
    </div>

    <script type="py">
        import random
        import asyncio
        from pyscript import document, when

        punts_jugador = 0
        punts_cpu = 0
        puntuacio_ronda = 0
        OBJECTIU = 100

        def log(msg):
            t = document.getElementById("terminal")
            t.innerHTML = f"> {msg}<br>" + t.innerHTML

        def actualizar_pantalla():
            document.getElementById("scoreboard").innerText = f"Tu: {punts_jugador} | CPU: {punts_cpu} (Ronda: {puntuacio_ronda})"

        async def animar_dau(resultat):
            dau_div = document.getElementById("dice-container")
            text_div = document.getElementById("dice-text")
            dau_div.classList.add("shaking")
            
            for _ in range(8):
                val = random.randint(1,6)
                text_div.innerText = f"+-------+\n|       |\n|   {val}   |\n|       |\n+-------+"
                await asyncio.sleep(0.06)
            
            dau_div.classList.remove("shaking")
            text_div.innerText = f"+-------+\n|       |\n|   {resultat}   |\n|       |\n+-------+"

        @when("click", "#btn-tira")
        async def tira(event):
            global puntuacio_ronda
            document.getElementById("btn-tira").disabled = True
            document.getElementById("btn-acumula").disabled = True
            
            tir = random.randint(1, 6)
            await animar_dau(tir)
            
            if tir == 1:
                log("Mala sort! Has tret un 1.")
                puntuacio_ronda = 0
                actualizar_pantalla()
                await torn_cpu()
            else:
                puntuacio_ronda += tir
                log(f"Has tret un {tir}. Ronda: {puntuacio_ronda}")
                actualizar_pantalla()
                document.getElementById("btn-tira").disabled = False
                document.getElementById("btn-acumula").disabled = False

        @when("click", "#btn-acumula")
        async def acumula(event):
            global punts_jugador, puntuacio_ronda
            punts_jugador += puntuacio_ronda
            puntuacio_ronda = 0
            actualizar_pantalla()
            
            if punts_jugador >= OBJECTIU:
                finalitzar("TU")
            else:
                await torn_cpu()

        async def torn_cpu():
            global punts_cpu
            document.getElementById("btn-tira").disabled = True
            document.getElementById("btn-acumula").disabled = True
            cpu_ronda = 0
            
            log("Torn de la CPU...")
            while True:
                await asyncio.sleep(1)
                tir = random.randint(1, 6)
                await animar_dau(tir)
                
                if tir == 1:
                    log("La CPU ha tret un 1.")
                    break
                else:
                    cpu_ronda += tir
                    if cpu_ronda >= 15 or (punts_cpu + cpu_ronda) >= OBJECTIU:
                        punts_cpu += cpu_ronda
                        log(f"La CPU guarda {cpu_ronda}.")
                        break
            
            actualizar_pantalla()
            if punts_cpu >= OBJECTIU:
                finalitzar("CPU")
            else:
                document.getElementById("btn-tira").disabled = False
                document.getElementById("btn-acumula").disabled = False

        def finalitzar(guanyador):
            document.getElementById("btn-tira").style.display = "none"
            document.getElementById("btn-acumula").style.display = "none"
            document.getElementById("btn-restart").style.display = "block"
            log(f"🏆 PARTIDA ACABADA. GUANYADOR: {guanyador}")

        @when("click", "#btn-restart")
        def reiniciar(event):
            global punts_jugador, punts_cpu, puntuacio_ronda
            punts_jugador = 0
            punts_cpu = 0
            puntuacio_ronda = 0
            document.getElementById("btn-tira").style.display = "block"
            document.getElementById("btn-acumula").style.display = "block"
            document.getElementById("btn-restart").style.display = "none"
            document.getElementById("btn-tira").disabled = False
            document.getElementById("btn-acumula").disabled = False
            document.getElementById("dice-text").innerText = "PIG"
            actualizar_pantalla()
            log("Partida reiniciada!")

    </script>
</body>
</html>
