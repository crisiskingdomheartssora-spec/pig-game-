<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pig Game 3D - Edició Videojoc</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --accent: #58a6ff;
            --success: #238636; --danger: #da3633; --gold: #d29922;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white;
            display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden;
        }

        /* Panell d'Instruccions */
        .tutorial {
            background: var(--panel); border: 1px solid #30363d; padding: 15px;
            border-radius: 12px; max-width: 450px; margin-bottom: 30px; font-size: 0.85rem;
        }

        /* --- ESCENA 3D DEL DAU --- */
        .scene {
            width: 100px; height: 100px; perspective: 600px; margin: 40px;
        }

        .cube {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
            transform: rotateX(-20deg) rotateY(20deg);
        }

        .face {
            position: absolute; width: 100px; height: 100px;
            background: white; border: 2px solid #ccc;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; color: black; border-radius: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        /* Posicions de les cares del cub */
        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-2 { transform: rotateY(90deg) translateZ(50px); }
        .face-3 { transform: rotateX(90deg) translateZ(50px); }
        .face-4 { transform: rotateX(-90deg) translateZ(50px); }
        .face-5 { transform: rotateY(-90deg) translateZ(50px); }
        .face-6 { transform: rotateY(180deg) translateZ(50px); }

        /* Estils dels punts del dau */
        .dot { width: 18px; height: 18px; background: black; border-radius: 50%; position: absolute; }

        /* Animació de sacsejada (Shake) mentre "pensa" */
        .shaking { animation: fast-spin 0.2s infinite linear; }
        @keyframes fast-spin {
            from { transform: rotateX(0) rotateY(0); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        /* Marcador i Terminal */
        .score-board { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 10px; }
        #terminal { 
            background: #010409; color: #8b949e; padding: 15px; border-radius: 8px;
            width: 90%; max-width: 500px; height: 80px; overflow-y: auto;
            border: 1px solid #30363d; font-family: monospace; font-size: 0.9rem;
        }

        .controls { margin-top: 25px; display: flex; gap: 15px; }
        button { 
            padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        #btn-tira { background: var(--success); color: white; box-shadow: 0 4px 0 #1a6328; }
        #btn-acumula { background: var(--accent); color: white; box-shadow: 0 4px 0 #1f6feb; }
        #btn-restart { background: var(--danger); color: white; display: none; margin-top: 20px; }
        button:active { transform: translateY(3px); box-shadow: none; }
        button:disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div class="tutorial">
        <strong style="color: var(--gold)">🎮 INSTRUCCIONS:</strong><br>
        • 🎲 <strong>Tira:</strong> Suma punts. Si surt un <b>1</b>, perds la ronda.<br>
        • 💰 <strong>Acumula:</strong> Guarda els teus punts i passa el torn.<br>
        • 🏆 <strong>Guanya:</strong> Arriba a <b>100 punts</b> abans que la CPU.
    </div>

    <div class="scene">
        <div class="cube" id="cube">
            <div class="face face-1">1</div>
            <div class="face face-2">2</div>
            <div class="face face-3">3</div>
            <div class="face face-4">4</div>
            <div class="face face-5">5</div>
            <div class="face face-6">6</div>
        </div>
    </div>

    <div id="scoreboard" class="score-board">0 - 0</div>
    <div id="terminal">Esperant el teu torn...</div>

    <div class="controls">
        <button id="btn-tira">🎲 Tirar</button>
        <button id="btn-acumula">💰 Acumular</button>
    </div>
    <button id="btn-restart">🔄 VOLVER A JUGAR</button>

    <script type="py">
        import random
        import asyncio
        from pyscript import document, when

        punts_jugador = 0
        punts_cpu = 0
        puntuacio_ronda = 0
        OBJECTIU = 100

        def log(msg):
            t = document.getElementById("terminal")
            t.innerHTML = f"<span style='color:var(--success)'>></span> {msg}<br>" + t.innerHTML

        async def rotar_dau(n):
            cube = document.getElementById("cube")
            # Coordenades per cada cara
            angles = {
                1: "rotateX(0deg) rotateY(0deg)",
                2: "rotateX(0deg) rotateY(-90deg)",
                3: "rotateX(-90deg) rotateY(0deg)",
                4: "rotateX(90deg) rotateY(0deg)",
                5: "rotateX(0deg) rotateY(90deg)",
                6: "rotateX(0deg) rotateY(180deg)"
            }
            # Afegim girs extra perquè sembli més realista
            extra_spin = f" rotateX({random.choice([360, 720])}deg) rotateY({random.choice([360, 720])}deg) "
            cube.style.transform = extra_spin + angles[n]
            await asyncio.sleep(1.5) # Temps de l'animació CSS

        @when("click", "#btn-tira")
        async def tira(event):
            global puntuacio_ronda
            document.getElementById("btn-tira").disabled = True
            document.getElementById("btn-acumula").disabled = True
            
            tir = random.randint(1, 6)
            log("Tirant...")
            await rotar_dau(tir)
            
            if tir == 1:
                log("<span style='color:var(--danger)'>HAS TRET UN 1! Perds la ronda.</span>")
                puntuacio_ronda = 0
                await torn_cpu()
            else:
                puntuacio_ronda += tir
                log(f"Has tret un {tir}. Ronda: {puntuacio_ronda}")
                document.getElementById("btn-tira").disabled = False
                document.getElementById("btn-acumula").disabled = False

        @when("click", "#btn-acumula")
        async def acumula(event):
            global punts_jugador, puntuacio_ronda
            punts_jugador += puntuacio_ronda
            puntuacio_ronda = 0
            document.getElementById("scoreboard").innerText = f"{punts_jugador} - {punts_cpu}"
            
            if punts_jugador >= OBJECTIU:
                finalitzar("HAS GUANYAT!")
            else:
                await torn_cpu()

        async def torn_cpu():
            global punts_cpu
            document.getElementById("btn-tira").disabled = True
            document.getElementById("btn-acumula").disabled = True
            cpu_ronda = 0
            log("Torn de la CPU...")
            
            while True:
                await asyncio.sleep(1)
                tir = random.randint(1, 6)
                await rotar_dau(tir)
                
                if tir == 1:
                    log("La CPU ha tret un 1.")
                    break
                else:
                    cpu_ronda += tir
                    if cpu_ronda >= 15 or (punts_cpu + cpu_ronda) >= OBJECTIU:
                        punts_cpu += cpu_ronda
                        log(f"La CPU guarda {cpu_ronda} punts.")
                        break
            
            document.getElementById("scoreboard").innerText = f"{punts_jugador} - {punts_cpu}"
            if punts_cpu >= OBJECTIU:
                finalitzar("LA CPU HA GUANYAT")
            else:
                document.getElementById("btn-tira").disabled = False
                document.getElementById("btn-acumula").disabled = False

        def finalitzar(msg):
            document.getElementById("btn-tira").style.display = "none"
            document.getElementById("btn-acumula").style.display = "none"
            document.getElementById("btn-restart").style.display = "inline-block"
            log(f"🏁 {msg}")

        @when("click", "#btn-restart")
        def reiniciar(event):
            location.reload() # La forma més neta de reiniciar tot el motor PyScript

    </script>
</body>
</html>
